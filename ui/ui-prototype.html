<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TGG Shop UI 原型 v1.5 完整版</title>
  <style>
    :root {
      --green: #00B96B; --orange: #FF6B00; --gold: #FFB800;
      --bg: #F5F6F8; --card: #fff; --text: #1A1A1A; --sub: #666; --border: #eee; --radius: 12px;
      --phone-w: 375px; --phone-h: 812px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; background: #e8eaed; color: var(--text); }
    .toolbar {
      position: sticky; top: 0; z-index: 300; background: #fff; border-bottom: 1px solid var(--border);
      padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .toolbar h1 { font-size: 15px; font-weight: 600; }
    .toolbar .ver { font-size: 12px; color: var(--sub); }
    .toolbar select {
      flex: 1; min-width: 220px; max-width: 360px; padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border); font-size: 13px;
    }
    .toolbar a { font-size: 12px; color: #1677ff; text-decoration: none; padding: 6px 10px; background: #f0f5ff; border-radius: 6px; }
    .stage { display: flex; justify-content: center; padding: 24px 16px 48px; }
    .wrap { text-align: center; }
    .wrap.hidden { display: none; }
    .phone {
      width: var(--phone-w); height: var(--phone-h); background: var(--bg);
      border-radius: 36px; box-shadow: 0 20px 60px rgba(0,0,0,.12);
      overflow: hidden; position: relative; border: 8px solid #222;
    }
    .sb { height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
    .sb.back { justify-content: flex-start; padding-left: 12px; gap: 6px; }
    .sb .arr { font-size: 22px; color: var(--sub); }
    .sb .right { margin-left: auto; padding-right: 16px; font-size: 13px; color: var(--green); font-weight: 400; }
    .scroll { height: calc(var(--phone-h) - 44px - 56px); overflow-y: auto; }
    .scroll.nt { height: calc(var(--phone-h) - 44px); }
    .scroll.mt { height: calc(var(--phone-h) - 44px - 44px - 56px); }
    .scroll.bb { height: calc(var(--phone-h) - 44px - 64px); }
    .tabbar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 56px; background: #fff;
      border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around;
      font-size: 10px; color: var(--sub);
    }
    .tabbar .on { color: var(--green); font-weight: 600; }
    .mtabs { display: flex; background: #fff; border-bottom: 1px solid var(--border); }
    .mtab { flex: 1; padding: 11px; text-align: center; font-size: 14px; border: none; background: none; color: var(--sub); }
    .mtab.on { color: var(--green); font-weight: 600; border-bottom: 2px solid var(--green); margin-bottom: -1px; }
    .card { background: var(--card); border-radius: var(--radius); margin: 12px 16px; padding: 16px; }
    .hint { font-size: 12px; color: var(--sub); line-height: 1.5; margin-top: 4px; }
    .tag { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #E8F8F0; color: var(--green); }
    .tag-o { background: #FFF7E6; color: var(--orange); }
    .tag-b { background: #E6F7FF; color: #1890ff; }
    .btn { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 600; width: 100%; }
    .btn-o { background: #fff; color: var(--green); border: 1px solid var(--green); border-radius: 8px; padding: 10px 16px; font-size: 14px; }
    .btn-sm { padding: 6px 14px; border-radius: 16px; font-size: 12px; border: none; }
    .lbl { text-align: center; font-size: 12px; color: var(--sub); margin-top: 10px; max-width: var(--phone-w); }
    /* splash */
    .splash { height: 100%; background: #111; color: #fff; display: flex; flex-direction: column; position: relative; }
    .splash-skip { position: absolute; top: 48px; right: 16px; background: rgba(0,0,0,.5); padding: 4px 12px; border-radius: 14px; font-size: 12px; }
    .splash-ad { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 26px; text-align: center; }
    /* home */
    .loc { padding: 10px 16px 0; font-size: 13px; color: var(--sub); }
    .search { margin: 10px 16px; background: #fff; border-radius: 20px; padding: 10px 14px; font-size: 14px; color: #999; }
    .banner { margin: 0 16px 14px; height: 110px; border-radius: var(--radius); background: linear-gradient(135deg,#00B96B,#00D68F); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 600; }
    .quick { display: flex; gap: 10px; padding: 0 16px 14px; }
    .qi { flex: 1; background: #fff; border-radius: var(--radius); padding: 12px 6px; text-align: center; font-size: 11px; }
    .qi .ic { font-size: 22px; margin-bottom: 4px; }
    .st { padding: 4px 16px 10px; font-size: 15px; font-weight: 600; }
    .cats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; padding: 0 16px 14px; }
    .cat { text-align: center; font-size: 11px; color: var(--sub); }
    .cat .c { width: 44px; height: 44px; border-radius: 50%; background: #E8F8F0; margin: 0 auto 4px; line-height: 44px; font-size: 18px; }
    .prods { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 20px; }
    .prod { background: #fff; border-radius: var(--radius); overflow: hidden; }
    .prod .img { height: 90px; background: #f0f0f0; }
    .prod .inf { padding: 8px; font-size: 12px; }
    .prod .pr { color: var(--green); font-weight: 600; margin-top: 2px; }
    /* earn */
    .sban { margin: 12px 16px; padding: 16px; border-radius: var(--radius); background: linear-gradient(135deg,#FFF7E6,#fff); border: 1px solid #FFE7BA; }
    .sban .t { font-size: 16px; font-weight: 700; color: var(--orange); }
    .sbar { margin: 0 16px 10px; }
    .sbar input { width: 100%; padding: 9px 14px; border: none; border-radius: 18px; background: #fff; font-size: 13px; }
    .chips { display: flex; gap: 8px; padding: 0 16px 10px; overflow-x: auto; }
    .chip { flex-shrink: 0; padding: 5px 12px; border-radius: 14px; border: 1px solid var(--border); background: #fff; font-size: 12px; color: var(--sub); }
    .chip.on { background: var(--green); color: #fff; border-color: var(--green); }
    .inv-e { display: flex; align-items: center; gap: 10px; margin: 0 16px 10px; padding: 12px 14px; background: linear-gradient(135deg,#E6F7FF,#fff); border: 1px solid #91D5FF; border-radius: var(--radius); }
    .inv-e .ic { font-size: 26px; }
    .inv-e .go { color: var(--green); font-size: 12px; white-space: nowrap; }
    .tc { display: flex; gap: 10px; margin: 0 16px 8px; padding: 10px; background: #fff; border-radius: var(--radius); align-items: center; }
    .tc .th { width: 52px; height: 52px; border-radius: 8px; background: #f0f0f0; flex-shrink: 0; }
    .tc .go { color: var(--green); font-size: 12px; }
    .rw { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; color: var(--sub); }
    .rw b { color: var(--orange); }
    .step { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .step:last-child { border: none; }
    .fg { margin-bottom: 12px; }
    .fg label { display: block; font-size: 13px; margin-bottom: 4px; }
    .fg input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
    .ex-tabs { display: flex; gap: 12px; font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
    .ex-tabs .on { color: var(--orange); border-bottom: 2px solid var(--orange); padding-bottom: 8px; margin-bottom: -11px; }
    .prog { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 10px 0; }
    .prog .f { height: 100%; background: var(--green); }
    .ww { position: relative; width: 210px; margin: 14px auto; }
    .wp { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); color: var(--orange); font-size: 18px; z-index: 2; }
    .wh { width: 210px; height: 210px; border-radius: 50%; background: conic-gradient(#52C41A 0 60deg,#1890FF 60deg 120deg,#FAAD14 120deg 180deg,#FF7A45 180deg 240deg,#722ED1 240deg 300deg,#EB2F96 300deg 360deg); box-shadow: 0 4px 14px rgba(0,0,0,.1); }
    .wh::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:44px; height:44px; background:#fff; border-radius:50%; border:2px solid #eee; }
    .ihero { margin: 12px 16px; padding: 22px 14px; text-align: center; background: linear-gradient(135deg,#F6FFED,#fff); border: 1px solid #B7EB8F; border-radius: var(--radius); }
    .icode { font-size: 30px; font-weight: 800; letter-spacing: 3px; color: var(--green); margin: 10px 0 14px; }
    .istats { display: flex; gap: 10px; margin: 0 16px 10px; }
    .istats .s { flex: 1; background: #fff; border-radius: var(--radius); padding: 14px; text-align: center; }
    .istats .n { font-size: 20px; font-weight: 700; color: var(--orange); }
    .ii { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .ii:last-child { border: none; }
    .ii .av { width: 36px; height: 36px; border-radius: 50%; background: var(--green); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; }
    .ii .cg { color: var(--orange); font-weight: 600; margin-left: auto; }
    /* shop */
    .cl { display: flex; height: calc(var(--phone-h) - 44px - 56px); }
    .cl-l { width: 90px; background: #fff; overflow-y: auto; font-size: 13px; }
    .cl-l div { padding: 14px 8px; text-align: center; color: var(--sub); border-left: 3px solid transparent; }
    .cl-l .on { background: var(--bg); color: var(--green); font-weight: 600; border-left-color: var(--green); }
    .cl-r { flex: 1; overflow-y: auto; padding: 10px; }
    .cl-r .p { display: flex; gap: 10px; background: #fff; border-radius: var(--radius); padding: 10px; margin-bottom: 8px; }
    .cl-r .p .img { width: 64px; height: 64px; background: #f0f0f0; border-radius: 8px; flex-shrink: 0; }
    .pd-img { height: 200px; background: #f0f0f0; }
    .pd-info { background: #fff; padding: 16px; margin-bottom: 10px; }
    .pd-price { font-size: 22px; color: var(--green); font-weight: 700; }
    .pd-btns { display: flex; gap: 10px; padding: 12px 16px; background: #fff; position: absolute; bottom: 56px; left: 0; right: 0; border-top: 1px solid var(--border); }
    .pd-btns button { flex: 1; padding: 12px; border-radius: 22px; border: none; font-size: 14px; font-weight: 600; }
    .pd-btns .sec { background: #E8F8F0; color: var(--green); }
    .pd-btns .pri { background: var(--green); color: #fff; }
    .ci { display: flex; gap: 10px; padding: 12px 16px; background: #fff; margin-bottom: 8px; align-items: center; }
    .ci .ck { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--green); flex-shrink: 0; }
    .ci .img { width: 72px; height: 72px; background: #f0f0f0; border-radius: 8px; }
    .ci .qty { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-top: 6px; }
    .cart-bar { position: absolute; bottom: 56px; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .cart-bar .sub { background: var(--green); color: #fff; border: none; border-radius: 20px; padding: 10px 24px; font-size: 14px; font-weight: 600; }
    /* checkout */
    .dtabs { display: flex; gap: 8px; margin-bottom: 10px; }
    .dtab { flex: 1; text-align: center; padding: 9px; border-radius: 8px; background: var(--bg); font-size: 12px; }
    .dtab.on { background: #E8F8F0; color: var(--green); font-weight: 600; border: 1px solid var(--green); }
    .cut { background: #FFF7E6; border: 1px solid #FFD591; border-radius: 8px; padding: 10px; font-size: 12px; color: #D46B08; margin-bottom: 10px; }
    .cut strong { display: block; font-size: 14px; margin-bottom: 4px; }
    .site { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .site:last-child { border: none; }
    .site .ck { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--green); }
    .site.on .ck { background: var(--green); }
    .addr { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .addr:last-child { border: none; }
    .bb { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .bb .go { background: var(--green); color: #fff; border: none; border-radius: 20px; padding: 11px 28px; font-size: 14px; font-weight: 600; }
    /* profile */
    .ph { background: var(--green); color: #fff; padding: 18px 16px 22px; }
    .ph .row { display: flex; gap: 12px; align-items: center; }
    .ph .av { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,.3); }
    .ph .stats { display: flex; gap: 16px; margin-top: 14px; font-size: 12px; }
    .ph .btns { display: flex; gap: 8px; margin-top: 10px; }
    .ph .btn-g { background: var(--gold); color: #333; }
    .ph .btn-w { background: transparent; border: 1px solid #fff; color: #fff; }
    .mi { display: flex; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .mi:last-child { border: none; }
    .ot { display: flex; gap: 20px; font-size: 13px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
    .ot .on { color: var(--orange); border-bottom: 2px solid var(--orange); padding-bottom: 8px; margin-bottom: -11px; }
    .ord { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .ord:last-child { border: none; }
    .qr { width: 150px; height: 150px; background: #f0f0f0; margin: 12px auto; border-radius: 8px; line-height: 150px; color: #999; }
    .lb-i { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .lb-i .rk { width: 24px; font-weight: 700; color: var(--orange); text-align: center; }
    .lb-i.me { background: #F6FFED; margin: 0 -16px; padding: 10px 16px; border-radius: 8px; }
    .mem-o { display: flex; gap: 10px; margin: 10px 0; }
    .mem-o div { flex: 1; text-align: center; padding: 14px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; }
    .mem-o .on { border-color: var(--green); background: #E8F8F0; color: var(--green); font-weight: 600; }
    .scan-f { height: 200px; background: #111; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; margin: 12px 0; }
    .pi { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .pi .add { color: var(--green); font-weight: 600; }
    .pi .sub { color: var(--orange); }
    textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; min-height: 80px; resize: none; font-family: inherit; }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>TGG Shop UI 完整原型</h1>
    <span class="ver">v1.5 · 对齐需求 §6 共 28 屏</span>

  <div class="stage">
    <div class="wrap" id="w">
      <div class="phone" id="phone"></div>
      <div class="lbl" id="lbl"></div>
    </div>
  </div>

const GROUPS = [
  { label: '── 启动/首页 ──', ids: ['splash','home'] },
  { label: '── 商城购物 ──', ids: ['category','product-detail','cart'] },
  { label: '── 赚积分-做任务 ──', ids: ['earn-tasks','task-detail','task-submit','my-examine','invite'] },
  { label: '── 赚积分-签到 ──', ids: ['signin','signin-progress','lottery'] },
  { label: '── 订单配送 ──', ids: ['checkout-pickup','checkout-delivery','pickup-site','address','orders','order-verify','refund'] },
  { label: '── 我的/会员 ──', ids: ['profile','points-history','leaderboard','membership','withdraw'] },
  { label: '── 代理/其他 ──', ids: ['agent-scan','service','feedback','business'] }
];

function tabbar(active) {
  const tabs = ['首页','赚积分','分类','购物车','我的'];
  return `<div class="tabbar">${tabs.map((t,i)=>`<div class="${i===active?'on':''}">${t}</div>`).join('')}</div>`;
}

function show(id) {
  const s = SCREENS[id];
  if (!s) return;
  document.getElementById('phone').innerHTML = s.html;
  document.getElementById('lbl').textContent = s.label;
  document.getElementById('picker').value = id;
}

function initPicker() {
  const sel = document.getElementById('picker');
  GROUPS.forEach(g => {
    const og = document.createElement('optgroup');
    og.label = g.label.replace(/── /g,'').replace(/ ──/g,'');
    g.ids.forEach(id => {
      const o = document.createElement('option');
      o.value = id;
      o.textContent = SCREENS[id].label;
      og.appendChild(o);
    });
    sel.appendChild(og);
  });
}

initPicker();
show('home');
